name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify docusaurus binary
        run: |
          echo "pwd: $(pwd)"
          ls -la
          echo "node_modules exists?"; ls -la node_modules || true
          echo "node_modules/.bin exists?"; ls -la node_modules/.bin || true
          echo "node version: $(node -v)"
          echo "npm version: $(npm -v)"
          npx --no-install docusaurus --version || true
          npm run -s build --if-present || true

      - name: Build
        run: npx docusaurus build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: true
